<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Live data flow</title>
  <desc id="desc">Pipeline from GitHub data through generated README assets into the live Three.js control room.</desc>
  <rect width="1280" height="420" rx="32" fill="#050814" />
  <rect x="38" y="34" width="1204" height="352" rx="28" stroke="rgba(56, 189, 248, 0.16)" />
  <text x="64" y="84" fill="#f8fafc" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="38" font-weight="700">Live Data Flow</text>
  <text x="64" y="116" fill="#c5d5e5" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="18">GitHub README stays image-based; the browser-interactive layer lives in the control room.</text>
  <text x="902" y="84" fill="#74f0df" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="16">LAST SYNC 6 Apr 2026, 11:41</text>
  <text x="902" y="112" fill="#fdd5b4" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="16">MAIL FandaKalasek@icloud.com</text>

  <path d="M222 223H318" stroke="#14b8a6" stroke-width="4" stroke-linecap="round" />
  <path d="M476 223H572" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" />
  <path d="M730 223H826" stroke="#f97316" stroke-width="4" stroke-linecap="round" />
  <path d="M984 223H1080" stroke="#a3e635" stroke-width="4" stroke-linecap="round" />

  <circle cx="270" cy="223" r="7" fill="#14b8a6" />
  <circle cx="524" cy="223" r="7" fill="#38bdf8" />
  <circle cx="778" cy="223" r="7" fill="#f97316" />
  <circle cx="1032" cy="223" r="7" fill="#a3e635" />

  
        <g transform="translate(64 168)">
          <rect width="158" height="110" rx="24" fill="#09101c" stroke="#14b8a6" stroke-opacity="0.38" />
          <text x="20" y="40" fill="#14b8a6" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14">GitHub APIs</text>
          <text x="20" y="74" fill="#f8fafc" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">profile + events</text>
        </g>
      
        <g transform="translate(318 168)">
          <rect width="158" height="110" rx="24" fill="#09101c" stroke="#38bdf8" stroke-opacity="0.38" />
          <text x="20" y="40" fill="#38bdf8" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14">refresh-profile</text>
          <text x="20" y="74" fill="#f8fafc" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">hourly sync</text>
        </g>
      
        <g transform="translate(572 168)">
          <rect width="158" height="110" rx="24" fill="#09101c" stroke="#f97316" stroke-opacity="0.38" />
          <text x="20" y="40" fill="#f97316" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14">JSON snapshot</text>
          <text x="20" y="74" fill="#f8fafc" font-family="Space Grotesk, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">assets + site/data</text>
        </g>
      
        <g transform="translate(826 168)">
          <rect width="158" height="110" rx="24" fill="#09101c" stroke="#a3e635" stroke-opacity="0.38" />
          <text x="20" y="40" fill="#a3e635" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14">README panels</text>
