        <g transform="translate(1080 168)">
          <rect width="158" height="110" rx="24" fill="#09101c" stroke="#facc15" stroke-opacity="0.38" />
          <text x="20" y="40" fill="#facc15" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="14">Three.js room</text>
